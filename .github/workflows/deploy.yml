name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
      
      - name: Upload to Azure Web App via FTP
        run: |
          # Create package
          zip -r package.zip static/ main.py models.py requirements.txt ai_engine.py -x "*.pyc"
          
          # Azure credentials from secrets
          AZURE_CRED=${{ secrets.AZURE_CREDENTIALS }}
          
          # Extract subscription ID
          SUB_ID=$(echo $AZURE_CREDENTIALS | jq -r '.subscriptionId')
          
          # Get deployment credentials via API
          TOKEN=$(curl -s -X POST "https://login.microsoftonline.com/$(echo $AZURE_CREDENTIALS | jq -r '.tenantId')/oauth2/v2.0/token" \
            -H "Content-Type=application/x-www-form-urlencoded" \
            -d "client_id=$(echo $AZURE_CREDENTIALS | jq -r '.clientId')" \
            -d "scope=https://management.azure.com/.default" \
            -d "client_secret=$(echo $AZURE_CREDENTIALS | jq -r '.clientSecret')" \
            -d "grant_type=client_credentials" | jq -r '.access_token')
          
          # Get publishing profile
          PROFILE=$(curl -s -X GET "https://management.azure.com/subscriptions/$SUB_ID/resourceGroups/RGPersonalSinope/providers/Microsoft.Web/sites/${{ secrets.AZURE_WEBAPP_NAME }}/publishingprofile?api-version=2022-03-01" \
            -H "Authorization: Bearer $TOKEN")
          
          FTP_URL=$(echo $PROFILE | jq -r '.publishingProfile.ftpPublishing.url')
          USERNAME=$(echo $PROFILE | jq -r '.publishingProfile.ftpPublishing.username')
          PASSWORD=$(echo $PROFILE | jq -r '.publishingProfile.ftpPublishing.password')
          
          # Upload via FTP
          echo "Uploading files via FTP..."
          curl -T package.zip -u "$USERNAME:$PASSWORD" "$FTP_URL/site/wwwroot/package.zip"
          
          echo "Deployment complete!"
