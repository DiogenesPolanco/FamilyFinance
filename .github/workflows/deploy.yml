name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
      
      - name: Upload to Azure Web App via FTP
        run: |
          # Create package
          zip -r package.zip static/ main.py models.py requirements.txt ai_engine.py -x "*.pyc"
          
          # Get token via API
          TOKEN_RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "scope=https://management.azure.com/.default" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")
          
          echo "Token response: $TOKEN_RESPONSE"
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to get token. Check credentials."
            exit 1
          fi
          
          # Get publishing credentials with proper headers
          echo "Getting publishing credentials..."
          CREDS=$(curl -s -X POST "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ secrets.AZURE_WEBAPP_NAME }}/listPublishingCredentials?api-version=2022-03-01" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Content-Length: 0")
          
          echo "Creds response: $CREDS"
          
          USERNAME=$(echo "$CREDS" | jq -r '.publishingUserName')
          PASSWORD=$(echo "$CREDS" | jq -r '.publishingPassword')
          
          echo "Username: $USERNAME"
          
          if [ "$USERNAME" = "null" ] || [ -z "$USERNAME" ]; then
            echo "Failed to get publishing credentials"
            exit 1
          fi
          
          # Upload via FTPS (explicit TLS)
          echo "Uploading files via FTPS..."
          curl -TLS -T package.zip -u "$USERNAME:$PASSWORD" "ftps://myfamilyfinance.ftps.azurewebsites.net/site/wwwroot/package.zip"
          
          echo "Upload complete!"
