name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
      
      - name: Deploy via FTP
        run: |
          zip -r package.zip static/ main.py models.py requirements.txt ai_engine.py -x "*.pyc"
          
          FTP_HOST="waws-prod-dm1-209.ftp.azurewebsites.windows.net"
          USERNAME="$MyFamilyFinance\$MyFamilyFinance"
          PASSWORD="ERNhgS1byc7jGSGZbBayvkAKmHhrQRtw8m30klfNdlgqGPifNzFyqXWqYTpA"
          
          echo "Uploading via FTP..."
          curl --ftp-ssl -T package.zip -u "$USERNAME:$PASSWORD" "ftp://$FTP_HOST/site/wwwroot/"
          
          echo "Upload complete!"
