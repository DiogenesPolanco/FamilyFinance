name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Web App
        run: |
          # Create package
          zip -r package.zip static/ main.py models.py requirements.txt ai_engine.py -x "*.pyc"
          
          # Set subscription
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          # Get publishing credentials
          az webapp deployment list-publishing-credentials \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" | tee creds.json
          
          USERNAME=$(jq -r '.publishingUserName' creds.json)
          PASSWORD=$(jq -r '.publishingPassword' creds.json)
          
          echo "Got credentials for: $USERNAME"
          
          # Upload via FTP
          echo "Uploading via FTP..."
          curl -T package.zip -u "$USERNAME:$PASSWORD" "ftp://myfamilyfinance.ftp.azurewebsites.net/site/wwwroot/package.zip"
          
          echo "Setting startup command..."
          az webapp config set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --startup-command "uvicorn main:app --host 0.0.0.0 --port 8000"
          
          echo "Deployment complete!"
