name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy via SCM
        run: |
          # Get publishing credentials
          PUBLISH_CREDENTIALS=$(az webapp deployment list-publishing-profiles \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "RGPersonalSinope" \
            --query "[?publishMethod=='FTP'].publishPassword" \
            --output tsv 2>/dev/null || echo "")
          
          if [ -z "$PUBLISH_CREDENTIALS" ]; then
            # Fallback: use deployment user
            az webapp deployment list-publishing-credentials \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "RGPersonalSinope" | tee creds.json
            
            USERNAME=$(jq -r '.publishingUserName' creds.json)
            PASSWORD=$(jq -r '.publishingPassword' creds.json)
            
            echo "Deploying via FTP..."
            curl -T static/index.html -u "$USERNAME:$PASSWORD" https://myfamilyfinance.ftp.azurewebsites.net/site/wwwroot/static/index.html
            curl -T main.py -u "$USERNAME:$PASSWORD" https://myfamilyfinance.ftp.azurewebsites.net/site/wwwroot/main.py
            curl -T models.py -u "$USERNAME:$PASSWORD" https://myfamilyfinance.ftp.azurewebsites.net/site/wwwroot/models.py
            curl -T requirements.txt -u "$USERNAME:$PASSWORD" https://myfamilyfinance.ftp.azurewebsites.net/site/wwwroot/requirements.txt
            
            echo "Setting startup command..."
            az webapp config set \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "RGPersonalSinope" \
              --startup-command "uvicorn main:app --host 0.0.0.0 --port 8000"
          else
            echo "Deployment profile found"
          fi
