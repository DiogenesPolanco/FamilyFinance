name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure using ZIP
        run: |
          # Create ZIP package
          zip -r package.zip static/ main.py models.py requirements.txt ai_engine.py -x "*.pyc"
          
          # Upload and deploy using REST API
          AZURE_WEBAPP_NAME="${{ secrets.AZURE_WEBAPP_NAME }}"
          RESOURCE_GROUP="RGPersonalSinope"
          SUBSCRIPTION_ID="e698d0af-e4dc-403f-9849-4b3f4e86082d"
          
          # Get publishing credentials
          echo "Getting deployment credentials..."
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP")
          
          USERNAME=$(echo $CREDS | jq -r '.publishingUserName')
          PASSWORD=$(echo $CREDS | jq -r '.publishingPassword')
          
          # Upload ZIP via FTP
          echo "Uploading files via FTP..."
          curl -T package.zip -u "$USERNAME:$PASSWORD" https://myfamilyfinance.ftp.azurewebsites.net/site/wwwroot/package.zip
          
          # Run deployment
          echo "Running deployment..."
          az webapp deployment source config-zip \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --src package.zip
          
          # Set startup command
          echo "Configuring startup command..."
          az webapp config set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --startup-command "uvicorn main:app --host 0.0.0.0 --port 8000"
