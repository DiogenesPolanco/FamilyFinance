name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run validation tests
        run: |
          python validate_frontend.py
          node test_translations.js
        continue-on-error: false
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy using Azure CLI
        run: |
          echo "Deploying to Azure Web App..."
          az webapp deployment source config-local-git \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "RGPersonalSinope" \
            --query "url" \
            --output tsv
          
          # Get deployment credentials
          DEPLOY_CREDENTIALS=$(az webapp deployment list-publishing-profiles \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "RGPersonalSinope" \
            --query "[?publishMethod=='MSDeploy'].publishPassword" \
            --output tsv)
          
          # Deploy using Git
          git remote add azure https://$DEPLOY_CREDENTIALS@myfamilyfinance.scm.azurewebsites.net/myfamilyfinance.git
          git push azure main:master --force
      
      - name: Set startup command
        run: |
          az webapp config set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "RGPersonalSinope" \
            --startup-command "uvicorn main:app --host 0.0.0.0 --port 8000"
